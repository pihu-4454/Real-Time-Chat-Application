<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6fb;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #fff;
      padding: 30px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .link {
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #4f46e5;
      text-decoration: none;
    }

    .error {
      color: red;
      margin-bottom: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Login</h2>

    <div class="error" id="error"></div>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <div class="link">
      New user? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        document.getElementById("error").textContent = "Enter username & password";
        return;
      }

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        // ✅ FIX: check success instead of res.ok
        if (!data.success) {
          document.getElementById("error").textContent = data.message || "Login failed";
          return;
        }

        // ✅ store username for chat page
        localStorage.setItem("username", username);

        // ✅ redirect
        window.location.href = "/chat.html";

      } catch (err) {
        document.getElementById("error").textContent = "Server error. Try again.";
        console.error(err);
      }
    }
  </script>

</body>
</html>
